<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Cobros · Academia DG</title>
<style>
  :root{
    --bg:#13171c; --panel:#1b2128; --panel2:#222a33; --line:#2c3540; --txt:#e9edf2; --muted:#8b97a8;
    --clay:#d97a4e; --court:#3fb27f; --gold:#e8b34a;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
  .mono{font-variant-numeric:tabular-nums}

  header{position:sticky;top:0;z-index:20;background:var(--panel);border-bottom:1px solid var(--line);padding:12px}
  .title{display:flex;align-items:center;gap:8px;font-weight:800;font-size:17px;letter-spacing:-.3px}
  .title .dot{width:10px;height:10px;border-radius:50%;background:var(--clay)}
  .title small{color:var(--muted);font-weight:500;font-size:11px}

  .totals{display:flex;gap:8px;margin-top:10px}
  .tcard{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:9px 11px}
  .tcard .k{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .tcard .v{font-size:15px;font-weight:800;margin-top:2px}
  .tcard.deuda .v{color:var(--clay)}
  .tcard.cobrado .v{color:var(--court)}
  .tcard.aldia .v{color:var(--court)}

  .toolbar{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  .btn{padding:9px 12px;border-radius:10px;border:1px solid var(--line);background:var(--panel2);color:var(--txt);font-size:13px;font-weight:600;cursor:pointer}
  .btn.primary{background:var(--clay);border-color:var(--clay);color:#1a1206}
  .search{flex:1;min-width:160px}
  .search input{width:100%;padding:9px 12px;border-radius:10px;border:1px solid var(--line);background:var(--panel2);color:var(--txt);font-size:14px}
  .filters{display:flex;gap:6px;margin-top:8px;overflow-x:auto}
  .chip{padding:6px 12px;border-radius:20px;border:1px solid var(--line);background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
  .chip.active{background:var(--txt);color:#111;border-color:var(--txt)}
  .chip.active.deuda{background:var(--clay);color:#1a1206;border-color:var(--clay)}

  main{padding:12px;padding-bottom:60px}
  .empty{text-align:center;color:var(--muted);padding:50px 16px}
  .empty h3{color:var(--txt);margin-bottom:6px}

  .acard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px}
  .acard.aldia{border-color:#244b3a}
  .acard.deuda{border-left:3px solid var(--clay)}
  .arow1{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
  .aname{font-weight:700;font-size:15px}
  .acat{font-size:11px;color:var(--muted);font-weight:600;background:var(--panel2);padding:2px 7px;border-radius:6px;margin-left:6px}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
  .stat{background:var(--panel2);border-radius:9px;padding:7px 9px}
  .stat .k{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .stat .v{font-size:14px;font-weight:800;margin-top:1px}
  .stat.saldo .v{color:var(--clay)}
  .stat.saldo.ok .v{color:var(--court)}
  .adetail{margin-top:10px;border-top:1px solid var(--line);padding-top:10px;display:none}
  .acard.open .adetail{display:block}
  .field{margin-bottom:8px}
  .field label{display:block;font-size:11px;color:var(--muted);margin-bottom:3px}
  .field input{width:100%;padding:9px 10px;border-radius:9px;border:1px solid var(--line);background:var(--bg);color:var(--txt);font-size:14px}
  .field input:disabled{opacity:.6}
  .field-row{display:flex;gap:8px}.field-row .field{flex:1}
  .ajustes{font-size:11px;color:var(--muted);margin-top:2px}
  .aactions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
  .aactions .btn{flex:1;padding:9px;font-size:12px;min-width:90px}
  .btn.pay{background:#1d3a2c;border-color:#2a5a42;color:#7df0aa}
  .btn.wa{background:#16361f;border-color:#25d366;color:#5ef08e}
  .btn.comp{background:#3a2a1a;border-color:#5a3a1a;color:#f0c389}
  .expand{font-size:11px;color:var(--gold);cursor:pointer;margin-top:8px;display:inline-block}

  .overlay{position:fixed;inset:0;background:#000b;display:none;align-items:flex-end;justify-content:center;z-index:50}
  .overlay.show{display:flex}
  .sheet{background:var(--panel);width:100%;max-width:560px;border-radius:16px 16px 0 0;padding:16px;max-height:90vh;overflow:auto}
  .sheet h3{margin-bottom:10px;font-size:16px}
  .sheet .field input{width:100%;padding:10px;border-radius:9px;border:1px solid var(--line);background:var(--panel2);color:var(--txt);font-size:14px}
  .sheet-actions{display:flex;gap:8px;margin-top:8px}.sheet-actions .btn{flex:1;padding:11px}
  .status{font-size:12px;color:var(--muted);text-align:center;margin-top:8px}

  #compWrap{display:flex;flex-direction:column;align-items:center;gap:12px}
  #compCanvas{width:100%;max-width:380px;border-radius:12px;border:1px solid var(--line)}
</style>
</head>
<body>

<header>
  <div class="title"><span class="dot"></span> Cobros · Academia DG <small>fase 2</small></div>
  <div class="totals">
    <div class="tcard deuda"><div class="k">Deuda total</div><div class="v mono" id="tDeuda">—</div></div>
    <div class="tcard cobrado"><div class="k">Cobrado (mes)</div><div class="v mono" id="tCobrado">—</div></div>
    <div class="tcard aldia"><div class="k">Al día</div><div class="v mono" id="tAldia">—</div></div>
  </div>
  <div class="toolbar">
    <div class="search"><input id="search" placeholder="Buscar alumno…"></div>
    <button class="btn" id="btnSync">🔄 Sincronizar</button>
  </div>
  <div class="filters">
    <button class="chip active" data-filter="todos">Todos</button>
    <button class="chip" data-filter="deuda">Con deuda</button>
    <button class="chip" data-filter="aldia">Al día</button>
    <button class="chip" data-filter="cobrados">Cobrados este mes</button>
  </div>
</header>

<main id="list"></main>

<div class="overlay" id="ovSync">
  <div class="sheet">
    <h3>🔄 Sincronizar con la hoja ALUMNOS</h3>
    <p style="font-size:11px;color:var(--muted);margin-bottom:12px">Lee de tu planilla: nombre, categoría, precio y el <b>pendiente (PENDT.)</b> ya calculado. El Sheet debe estar compartido como "cualquiera con el enlace".</p>
    <div class="field"><label>ID del Google Sheet</label><input id="fSheetId"></div>
    <div class="field"><label>Nombre de la hoja</label><input id="fSheetTab"></div>
    <div class="sheet-actions"><button class="btn primary" id="doSync">🔄 Sincronizar ahora</button></div>
    <p class="status" id="syncStatus"></p>
    <div class="sheet-actions"><button class="btn" id="closeSync">Cerrar</button></div>
  </div>
</div>

<div class="overlay" id="ovComp">
  <div class="sheet">
    <h3>🧾 Comprobante</h3>
    <div id="compWrap">
      <canvas id="compCanvas" width="760" height="900"></canvas>
      <div class="sheet-actions" style="width:100%;max-width:380px">
        <button class="btn comp" id="compDownload">⬇️ Descargar imagen</button>
        <button class="btn wa" id="compWA">💬 Enviar WhatsApp</button>
      </div>
    </div>
    <div class="sheet-actions"><button class="btn" id="closeComp">Cerrar</button></div>
  </div>
</div>

<script>
const DEFAULT_SHEET_ID='1Ux1uQJ31EpxnWafAIJw0cuzS2B2vfuv--LUfDA4bVqc';
const DEFAULT_SHEET_TAB='ALUMNOS';
const MESES=['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];

let state={ sheetId:DEFAULT_SHEET_ID, sheetTab:DEFAULT_SHEET_TAB, alumnos:[], registro:{}, info:'' };
let filter='todos', query='';
const MES_ACTUAL=new Date().getMonth(), ANIO_ACTUAL=new Date().getFullYear();
const periodo=ANIO_ACTUAL+'-'+MES_ACTUAL;

function save(){ localStorage.setItem('cobros_dg_v2', JSON.stringify(state)); }
function load(){
  const s=localStorage.getItem('cobros_dg_v2');
  if(s){ try{ state=JSON.parse(s); }catch(e){} }
  if(!state.sheetId) state.sheetId=DEFAULT_SHEET_ID;
  if(!state.sheetTab) state.sheetTab=DEFAULT_SHEET_TAB;
  if(!state.alumnos) state.alumnos=[];
  if(!state.registro) state.registro={};
}
function normName(s){ return String(s==null?'':s).trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' '); }
function gs(n){ n=Math.round(Number(n)||0); return n.toLocaleString('es-PY').replace(/,/g,'.'); }
function parseNum(v){ let s=String(v==null?'':v).replace(/[^\d-]/g,''); const n=parseInt(s,10); return isNaN(n)?0:n; }

function reg(nombre){
  const k=normName(nombre);
  if(!state.registro[k]) state.registro[k]={ajuste:0,ajusteNota:'',pagos:[]};
  if(!state.registro[k].pagos) state.registro[k].pagos=[];
  return state.registro[k];
}
function pagadoMes(nombre){ return reg(nombre).pagos.filter(p=>p.periodo===periodo).reduce((s,p)=>s+(p.monto||0),0); }
function calc(a){
  const r=reg(a.nombre); const ajuste=r.ajuste||0; const pagado=pagadoMes(a.nombre);
  const aCobrar=(a.pendiente||0)+ajuste;
  const saldo=Math.max(0, aCobrar - pagado);
  return {ajuste, pagado, aCobrar, saldo, tieneDeuda:(aCobrar-pagado)>0};
}

let _rows=null,_headers=null;
function parseCSV(text){
  const rows=[];let row=[],cur='',q=false;
  for(let i=0;i<text.length;i++){const ch=text[i];
    if(q){ if(ch==='"'){ if(text[i+1]==='"'){cur+='"';i++;}else q=false;} else cur+=ch; }
    else{ if(ch==='"')q=true; else if(ch===','){row.push(cur);cur='';} else if(ch==='\n'){row.push(cur);rows.push(row);row=[];cur='';} else if(ch==='\r'){} else cur+=ch; }
  }
  if(cur!==''||row.length){row.push(cur);rows.push(row);}
  return rows;
}
function findCol(h,opts){ const H=h.map(x=>normName(x)); for(const o of opts){ const i=H.findIndex(z=>z.indexOf(o)>-1); if(i>-1) return i; } return -1; }
function findExact(h,opts){ const H=h.map(x=>normName(x)); for(const o of opts){ const i=H.findIndex(z=>z===o); if(i>-1) return i; } return -1; }

async function sync(){
  const st=document.getElementById('syncStatus');
  const id=document.getElementById('fSheetId').value.trim()||DEFAULT_SHEET_ID;
  const tab=document.getElementById('fSheetTab').value.trim()||DEFAULT_SHEET_TAB;
  state.sheetId=id; state.sheetTab=tab; save();
  st.textContent='⏳ Leyendo hoja '+tab+'…';
  const url='https://docs.google.com/spreadsheets/d/'+id+'/gviz/tq?tqx=out:csv&sheet='+encodeURIComponent(tab);
  try{
    const res=await fetch(url); if(!res.ok) throw new Error('HTTP '+res.status);
    const rows=parseCSV(await res.text());
    if(rows.length<2) throw new Error('hoja vacía');
    let hr=-1;
    for(let r=0;r<Math.min(rows.length,12);r++){
      const hh=rows[r].map(x=>normName(x));
      if(hh.some(h=>h==='alumnos'||h==='alumno') && hh.some(h=>h.indexOf('precio')>-1||h.indexOf('telefono')>-1||h.indexOf('categor')>-1)){ hr=r; break; }
    }
    if(hr<0) for(let r=0;r<Math.min(rows.length,12);r++){ if(rows[r].map(x=>normName(x)).some(h=>h.indexOf('alumno')>-1)){ hr=r; break; } }
    if(hr<0) hr=0;
    _headers=rows[hr];
    const iNom=findCol(_headers,['alumnos','alumno']);
    const iCat=findCol(_headers,['categor','ategor']);
    const iPre=findCol(_headers,['precio']);
    const iTel=findCol(_headers,['telefono','celular','whatsapp']);
    // PENDT. (pendiente): el rótulo puede estar en otra fila (en la planilla está en la fila 1, no en la 2)
    let iPen=findExact(_headers,['pendt.','pendt','pendiente','pend.','pend','deuda']);
    if(iPen<0) iPen=findCol(_headers,['pendt','pendiente','deuda','saldo']);
    if(iPen<0){ // escanear las primeras filas buscando el rótulo PENDT
      for(let r=0;r<Math.min(rows.length,hr+1);r++){
        const idx=rows[r].findIndex(c=>{ const n=normName(c); return n==='pendt.'||n==='pendt'||n.indexOf('pendiente')>-1||n.indexOf('pendt')>-1; });
        if(idx>-1){ iPen=idx; break; }
      }
    }
    if(iPen<0 && iTel>-1){ iPen=iTel+1; } // último recurso: columna a la derecha del teléfono
    if(iNom<0) throw new Error('no encontré la columna "Alumnos"');
    const out=[];
    for(let r=hr+1;r<rows.length;r++){
      const nombre=(rows[r][iNom]||'').trim();
      if(!nombre) continue;
      out.push({
        nombre,
        cat:(iCat>-1?(rows[r][iCat]||'').trim():''),
        precio:(iPre>-1?parseNum(rows[r][iPre]):0),
        pendiente:(iPen>-1?parseNum(rows[r][iPen]):0),
        tel:(iTel>-1?(rows[r][iTel]||'').trim():'')
      });
    }
    state.alumnos=out;
    const conDeuda=out.filter(a=>a.pendiente>0).length;
    state.info='✅ '+out.length+' alumnos · '+conDeuda+' con deuda'+(iPen<0?' · ⚠️ no encontré la columna PENDT.':'');
    save(); st.textContent=state.info; render();
  }catch(err){
    st.textContent='❌ No se pudo leer: '+err.message+'. Verificá el ID y que el Sheet esté compartido como "cualquiera con el enlace".';
  }
}

function render(){
  const q=normName(query);
  let lista=state.alumnos.map(a=>({a,c:calc(a)}));
  if(q) lista=lista.filter(x=>normName(x.a.nombre).indexOf(q)>-1);
  if(filter==='deuda') lista=lista.filter(x=>x.c.tieneDeuda);
  else if(filter==='aldia') lista=lista.filter(x=>!x.c.tieneDeuda && x.c.aCobrar>0);
  else if(filter==='cobrados') lista=lista.filter(x=>x.c.pagado>0);
  else lista=lista.filter(x=>x.c.aCobrar>0 || x.c.pagado>0 || x.a.precio>0);
  lista.sort((x,y)=> y.c.saldo-x.c.saldo || x.a.nombre.localeCompare(y.a.nombre));

  let tDeuda=0,tCobrado=0,nAldia=0;
  state.alumnos.forEach(a=>{ const c=calc(a); tDeuda+=c.saldo; tCobrado+=c.pagado; if(c.aCobrar>0 && !c.tieneDeuda) nAldia++; });
  document.getElementById('tDeuda').textContent=gs(tDeuda);
  document.getElementById('tCobrado').textContent=gs(tCobrado);
  document.getElementById('tAldia').textContent=nAldia;

  const el=document.getElementById('list');
  if(!state.alumnos.length){ el.innerHTML='<div class="empty"><h3>Sin datos todavía</h3><p>Tocá 🔄 Sincronizar para traer los alumnos y sus pendientes.</p></div>'; return; }
  if(!lista.length){ el.innerHTML='<div class="empty"><h3>Nada para mostrar</h3><p>Probá otro filtro o revisá la búsqueda.</p></div>'; return; }

  el.innerHTML=lista.map(({a,c})=>{
    const idx=state.alumnos.indexOf(a); const r=reg(a.nombre);
    const pagosMes=r.pagos.filter(p=>p.periodo===periodo);
    return `<div class="acard ${c.tieneDeuda?'deuda':(c.aCobrar>0?'aldia':'')}" data-card="${idx}">
      <div class="arow1"><div><span class="aname">${esc(a.nombre)}</span>${a.cat?`<span class="acat">Cat ${esc(a.cat)}</span>`:''}</div></div>
      <div class="grid3">
        <div class="stat"><div class="k">A cobrar</div><div class="v mono">${gs(c.aCobrar)}</div></div>
        <div class="stat"><div class="k">Pagado mes</div><div class="v mono">${gs(c.pagado)}</div></div>
        <div class="stat saldo ${c.saldo<=0?'ok':''}"><div class="k">${c.saldo<=0?'Al día':'Saldo'}</div><div class="v mono">${c.saldo<=0?'✓':gs(c.saldo)}</div></div>
      </div>
      <span class="expand" data-exp="${idx}">⚙️ Ajustar / registrar pago ▾</span>
      <div class="adetail">
        <div class="field-row">
          <div class="field"><label>Precio base (planilla)</label><input class="mono" value="${gs(a.pendiente)}" disabled></div>
          <div class="field"><label>Ajuste (+/−)</label><input type="number" inputmode="numeric" value="${r.ajuste||''}" placeholder="0" data-ajuste="${idx}"></div>
        </div>
        <div class="field"><label>Nota del ajuste (ej: clase extra / faltó)</label><input value="${esc(r.ajusteNota||'')}" placeholder="Opcional" data-ajustenota="${idx}"></div>
        <div class="field-row">
          <div class="field"><label>Registrar pago Gs.</label><input type="number" inputmode="numeric" placeholder="0" data-pago="${idx}"></div>
          <button class="btn pay" data-addpago="${idx}" style="align-self:flex-end;height:42px;flex:0 0 auto;padding:0 16px">+ Pago</button>
        </div>
        ${pagosMes.length?`<div class="ajustes">Pagos de ${MESES[MES_ACTUAL]}: ${pagosMes.map(p=>`Gs.${gs(p.monto)} <span data-rmpago="${idx}|${r.pagos.indexOf(p)}" style="color:#ff8a8a;cursor:pointer">✕</span>`).join(' · ')}</div>`:''}
        <div class="aactions">
          <button class="btn pay" data-pagartodo="${idx}">Pagar todo</button>
          <button class="btn comp" data-comp="${idx}">🧾 Comprobante</button>
          ${a.tel?`<button class="btn wa" data-wa="${idx}">💬</button>`:''}
        </div>
      </div>
    </div>`;
  }).join('');

  el.querySelectorAll('[data-exp]').forEach(s=>{ s.onclick=()=>{ el.querySelector(`[data-card="${s.dataset.exp}"]`).classList.toggle('open'); }; });
  el.querySelectorAll('[data-ajuste]').forEach(inp=>{ inp.onchange=()=>{ reg(state.alumnos[+inp.dataset.ajuste].nombre).ajuste=parseNum(inp.value); save(); render(); reopen(+inp.dataset.ajuste); }; });
  el.querySelectorAll('[data-ajustenota]').forEach(inp=>{ inp.onchange=()=>{ reg(state.alumnos[+inp.dataset.ajustenota].nombre).ajusteNota=inp.value; save(); }; });
  el.querySelectorAll('[data-addpago]').forEach(b=>{ b.onclick=()=>{ const i=+b.dataset.addpago; const inp=el.querySelector(`[data-pago="${i}"]`); const m=parseNum(inp.value); if(m>0){ reg(state.alumnos[i].nombre).pagos.push({monto:m,periodo,fecha:new Date().toISOString().slice(0,10)}); save(); render(); reopen(i); } }; });
  el.querySelectorAll('[data-pagartodo]').forEach(b=>{ b.onclick=()=>{ const i=+b.dataset.pagartodo; const c=calc(state.alumnos[i]); if(c.saldo>0){ reg(state.alumnos[i].nombre).pagos.push({monto:c.saldo,periodo,fecha:new Date().toISOString().slice(0,10)}); save(); render(); reopen(i); } }; });
  el.querySelectorAll('[data-rmpago]').forEach(s=>{ s.onclick=()=>{ const [i,pi]=s.dataset.rmpago.split('|').map(Number); reg(state.alumnos[i].nombre).pagos.splice(pi,1); save(); render(); reopen(i); }; });
  el.querySelectorAll('[data-comp]').forEach(b=>{ b.onclick=()=>openComp(+b.dataset.comp); });
  el.querySelectorAll('[data-wa]').forEach(b=>{ b.onclick=()=>enviarWA(+b.dataset.wa); });
}
function reopen(idx){ const c=document.querySelector(`[data-card="${idx}"]`); if(c) c.classList.add('open'); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function normPhone(raw){ let d=String(raw||'').replace(/\D/g,''); if(!d) return ''; if(d.indexOf('595')===0) return d; if(d.charAt(0)==='0') d=d.slice(1); return d.length<=10?'595'+d:d; }
function msgCobro(a,c){
  return `Hola ${a.nombre}! 👋\n\n`+
    `Te paso tu estado de cuenta en Academia DG:\n`+
    `💵 A cobrar: Gs. ${gs(c.aCobrar)}\n`+
    (c.pagado>0?`✅ Pagado: Gs. ${gs(c.pagado)}\n`:'')+
    (c.saldo>0?`⚠️ Saldo pendiente: Gs. ${gs(c.saldo)}\n`:`✅ ¡Estás al día! Gracias 🙌\n`);
}
function enviarWA(idx){
  const a=state.alumnos[idx]; const tel=normPhone(a.tel);
  if(!tel){ alert('Ese alumno no tiene teléfono en la hoja.'); return; }
  window.open('https://web.whatsapp.com/send?phone='+tel+'&text='+encodeURIComponent(msgCobro(a,calc(a))), 'waCobros');
}

let compIdx=null;
function openComp(idx){ compIdx=idx; drawComp(idx); document.getElementById('ovComp').classList.add('show'); }
function drawComp(idx){
  const a=state.alumnos[idx], c=calc(a);
  const cv=document.getElementById('compCanvas'), x=cv.getContext('2d'); const W=cv.width,H=cv.height;
  x.fillStyle='#1b2128'; x.fillRect(0,0,W,H);
  x.fillStyle='#d97a4e'; x.fillRect(0,0,W,16);
  x.fillStyle='#e9edf2'; x.textAlign='left';
  x.font='800 46px -apple-system,Segoe UI,sans-serif'; x.fillText('Academia DG',50,100);
  x.fillStyle='#8b97a8'; x.font='600 26px -apple-system,Segoe UI,sans-serif'; x.fillText('Estado de cuenta',50,140);
  x.strokeStyle='#2c3540'; x.lineWidth=2; x.beginPath(); x.moveTo(50,170); x.lineTo(W-50,170); x.stroke();
  x.fillStyle='#8b97a8'; x.font='600 22px -apple-system,Segoe UI,sans-serif'; x.fillText('ALUMNO',50,220);
  x.fillStyle='#e9edf2'; x.font='800 40px -apple-system,Segoe UI,sans-serif'; x.fillText(a.nombre,50,262);
  x.fillStyle='#8b97a8'; x.font='600 24px -apple-system,Segoe UI,sans-serif'; x.fillText(MESES[MES_ACTUAL]+' '+ANIO_ACTUAL+(a.cat?('   ·   Cat '+a.cat):''),50,300);
  const rows=[['A cobrar','Gs. '+gs(c.aCobrar)],['Pagado','Gs. '+gs(c.pagado)]];
  let y=370;
  rows.forEach(rw=>{ x.fillStyle='#222a33'; rr(x,50,y-34,W-100,52,10); x.fill();
    x.fillStyle='#8b97a8'; x.font='600 26px -apple-system,Segoe UI,sans-serif'; x.textAlign='left'; x.fillText(rw[0],70,y);
    x.fillStyle='#e9edf2'; x.font='800 28px -apple-system,Segoe UI,sans-serif'; x.textAlign='right'; x.fillText(rw[1],W-70,y); y+=66; });
  const ok=c.saldo<=0;
  x.fillStyle= ok?'#173d2c':'#3a2118'; rr(x,50,y-34,W-100,70,12); x.fill();
  x.fillStyle= ok?'#3fb27f':'#d97a4e'; x.font='800 30px -apple-system,Segoe UI,sans-serif'; x.textAlign='left'; x.fillText(ok?'AL DÍA':'SALDO',70,y+12);
  x.font='800 36px -apple-system,Segoe UI,sans-serif'; x.textAlign='right'; x.fillText(ok?'✓':('Gs. '+gs(c.saldo)),W-70,y+12);
  x.fillStyle='#8b97a8'; x.font='500 22px -apple-system,Segoe UI,sans-serif'; x.textAlign='center';
  const h=new Date(); x.fillText('Generado el '+h.getDate()+'/'+(h.getMonth()+1)+'/'+h.getFullYear()+' · Academia DG',W/2,H-50);
}
function rr(x,X,Y,w,h,r){ x.beginPath();x.moveTo(X+r,Y);x.arcTo(X+w,Y,X+w,Y+h,r);x.arcTo(X+w,Y+h,X,Y+h,r);x.arcTo(X,Y+h,X,Y,r);x.arcTo(X,Y,X+w,Y,r);x.closePath(); }
function descargarComp(){ const a=state.alumnos[compIdx]; const l=document.createElement('a'); l.download='estado_'+normName(a.nombre).replace(/ /g,'_')+'.png'; l.href=document.getElementById('compCanvas').toDataURL('image/png'); document.body.appendChild(l); l.click(); document.body.removeChild(l); }

document.getElementById('search').oninput=(e)=>{ query=e.target.value; render(); };
document.querySelectorAll('.chip[data-filter]').forEach(ch=>{
  ch.onclick=()=>{ document.querySelectorAll('.chip[data-filter]').forEach(c=>{c.classList.remove('active');c.classList.remove('deuda');}); ch.classList.add('active'); if(ch.dataset.filter==='deuda') ch.classList.add('deuda'); filter=ch.dataset.filter; render(); };
});
document.getElementById('btnSync').onclick=()=>{ document.getElementById('fSheetId').value=state.sheetId; document.getElementById('fSheetTab').value=state.sheetTab; document.getElementById('syncStatus').textContent=state.info||''; document.getElementById('ovSync').classList.add('show'); };
document.getElementById('doSync').onclick=sync;
document.getElementById('closeSync').onclick=()=>document.getElementById('ovSync').classList.remove('show');
document.getElementById('compDownload').onclick=descargarComp;
document.getElementById('compWA').onclick=()=>{ if(compIdx!=null) enviarWA(compIdx); };
document.getElementById('closeComp').onclick=()=>document.getElementById('ovComp').classList.remove('show');
['ovSync','ovComp'].forEach(id=>{ document.getElementById(id).onclick=(e)=>{ if(e.target.id===id) document.getElementById(id).classList.remove('show'); }; });

load(); render();
</script>
